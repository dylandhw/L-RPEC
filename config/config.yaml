# api paths mapped to services
# set to httpbin.org standard http methods (again, for convenience)
routes:
  - path: /delete
    upstream: http://localhost:8081/
  - path: /get
    upstream: http://localhost:8081/
  - path: /patch
    upstream: http://localhost:8081/
  - path: /post
    upstream: http://localhost:8081/
  - path: /put
    upstream: http://localhost:8081/
  - path: /
    upstream: http://localhost:8081/
